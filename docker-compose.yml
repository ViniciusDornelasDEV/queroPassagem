services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${DOCKER_UID}
        GID: ${DOCKER_GID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: laravel_quero_passagem
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: laravel_redis
    ports:
      - "6379:6379"
